{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5 fade-in">
    <div class="col-md-5 col-lg-4">
        <div class="glass-card p-4">
            <div class="text-center mb-4">
                <div class="icon-circle {{ 'blue' if role == 'student' else 'green' }} mx-auto">
                    <i class="bi bi-person-plus-fill"></i>
                </div>
                <h3 class="mt-2 mb-1">Register</h3>
                <span class="badge-glass {{ 'badge-blue' if role == 'student' else 'badge-green' }}">
                    {{ role | capitalize }}
                </span>
            </div>

            <form method="POST" action="{{ url_for('register') }}">
                <input type="hidden" name="role" value="{{ role }}">

                <div class="mb-3">
                    <label for="name" class="form-label-glass">Full Name</label>
                    <input type="text" class="form-control form-control-glass" id="name" name="name"
                        placeholder="Enter your full name" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label-glass">Email Address</label>
                    <input type="email" class="form-control form-control-glass" id="email" name="email"
                        placeholder="Enter your email" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label-glass">Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control form-control-glass" id="password" name="password"
                            placeholder="Create a password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('password', this)">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="registerBtn"
                    class="btn {{ 'btn-gradient-blue' if role == 'student' else 'btn-gradient-green' }} w-100 mb-3">
                    <span class="btn-text"><i class="bi bi-check-circle me-1"></i> Register</span>
                    <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                </button>

                <script>
                    document.querySelector('form').addEventListener('submit', function() {
                        const btn = document.getElementById('registerBtn');
                        btn.disabled = true;
                        btn.querySelector('.btn-text').classList.add('d-none');
                        btn.querySelector('.spinner-border').classList.remove('d-none');
                    });
                </script>

                <p class="text-center small" style="color: var(--text-muted);">
                    Already have an account?
                    <a href="{{ url_for('login', role=role) }}">Login here</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
