{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4 fade-in">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card p-4">
            <h3 class="mb-4">
                <i class="bi bi-plus-circle" style="color: var(--accent-green)"></i> Create New Class
            </h3>

            <p class="text-muted small mb-4">
                Create a class to organize your assignments. Students will need a unique 6-digit code to join.
            </p>

            <form method="POST">
                <div class="mb-3">
                    <label for="class_name" class="form-label-glass">Class Name</label>
                    <input type="text" class="form-control form-control-glass" id="class_name" name="class_name"
                           placeholder="e.g., Computer Science - Section A" required>
                </div>

                <button type="submit" class="btn btn-gradient-green w-100">
                    <i class="bi bi-check-circle me-1"></i> Create Class
                </button>
            </form>

            <a href="{{ url_for('faculty_dashboard') }}" class="btn btn-glass w-100 mt-2">
                <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
