{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5 fade-in">
    <div class="col-md-5 col-lg-4">
        <div class="glass-card p-4">
            <div class="text-center mb-4">
                <div class="icon-circle {{ 'blue' if role == 'student' else 'green' }} mx-auto">
                    <i class="bi {{ 'bi-mortarboard-fill' if role == 'student' else 'bi-person-workspace' }}"></i>
                </div>
                <h3 class="mt-2 mb-1">Login</h3>
                <span class="badge-glass {{ 'badge-blue' if role == 'student' else 'badge-green' }}">
                    {{ role | capitalize }}
                </span>
            </div>

            <form method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="role" value="{{ role }}">

                <div class="mb-3">
                    <label for="email" class="form-label-glass">Email Address</label>
                    <input type="email" class="form-control form-control-glass" id="email" name="email"
                           placeholder="Enter your email" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label-glass">Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control form-control-glass" id="password" name="password"
                               placeholder="Enter your password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('password', this)">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <a href="{{ url_for('forgot_password', role=role) }}" class="small text-decoration-none" style="color: var(--text-secondary);">
                        <i class="bi bi-question-circle me-1"></i>Forgot Password?
                    </a>
                </div>

                <button type="submit" class="btn {{ 'btn-gradient-blue' if role == 'student' else 'btn-gradient-green' }} w-100 mb-3">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Login
                </button>

                <p class="text-center small" style="color: var(--text-muted);">
                    Don't have an account?
                    <a href="{{ url_for('register', role=role) }}">Register here</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
