{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4 fade-in">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card p-4">
            <h3 class="mb-4">
                <i class="bi bi-people-fill" style="color: var(--accent-blue)"></i> Join Class
            </h3>

            <p class="text-light small mb-4">
                Enter the 6-digit join code provided by your faculty. This will allow you to see and submit assignments.
            </p>

            <form method="POST">
                <div class="mb-3">
                    <label for="join_code" class="form-label-glass">Join Code</label>
                    <input type="text" class="form-control form-control-glass text-center" id="join_code" name="join_code"
                           placeholder="Enter 6-digit code" maxlength="6" required>
                </div>

                <button type="submit" class="btn btn-gradient-blue w-100">
                    <i class="bi bi-check-circle me-1"></i> Join Now
                </button>
            </form>

            <a href="{{ url_for('student_dashboard') }}" class="btn btn-glass w-100 mt-2">
                <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
