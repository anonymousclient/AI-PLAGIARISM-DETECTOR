{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="mb-3">
                    <i class="bi bi-cloud-upload text-primary me-2"></i>Upload Assignment
                </h3>
                <p class="text-muted">
                    <strong>{{ assignment.subject }}</strong> — {{ assignment.title }}
                </p>
                <hr>

                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="file" class="form-label">Select File (PDF or DOCX only)</label>
                        <input type="file" class="form-control" id="file" name="file"
                               accept=".pdf,.docx" required>
                        <div class="form-text">Maximum file size: 10 MB</div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-upload me-1"></i> Submit Assignment
                    </button>
                </form>

                <a href="{{ url_for('student_dashboard') }}" class="btn btn-outline-secondary w-100 mt-2">
                    <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
