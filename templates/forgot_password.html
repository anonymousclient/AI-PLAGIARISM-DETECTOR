{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5 fade-in">
    <div class="col-md-5 col-lg-4">
        <div class="glass-card p-4">
                <div class="text-center mb-4">
                    <div class="icon-circle mb-3 mx-auto" style="color: #3b82f6; border-color: rgba(59, 130, 246, 0.2); background: rgba(59, 130, 246, 0.1);">
                        <i class="bi bi-envelope-at-fill"></i>
                    </div>
                    <h3 class="mt-2 mb-1">Forgot Password</h3>
                    <p class="small" style="color: #f1f5f9; opacity: 0.9;">Enter your registered email address to receive a 6-digit verification code.</p>
                </div>

                <form method="POST" id="forgotForm">
                    <input type="hidden" name="role" value="{{ role }}">

                    <div class="mb-4">
                        <label for="email" class="form-label-glass" style="color: #f1f5f9;">Email Address</label>
                        <input type="email" class="form-control form-control-glass" id="email" name="email"
                               placeholder="Enter your email" required autofocus>
                    </div>

                    <button type="submit" id="sendBtn" class="btn btn-gradient-blue w-100 mb-3">
                        <span class="btn-text"><i class="bi bi-send-fill me-1"></i> Send Reset Code</span>
                        <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                    </button>

                    <script>
                        document.getElementById('forgotForm').addEventListener('submit', function() {
                            const btn = document.getElementById('sendBtn');
                            btn.disabled = true;
                            btn.querySelector('.btn-text').classList.add('d-none');
                            btn.querySelector('.spinner-border').classList.remove('d-none');
                        });
                    </script>

                <p class="text-center small mb-0">
                    <a href="{{ url_for('login', role=role) }}" style="color: var(--text-muted);"><i class="bi bi-arrow-left me-1"></i> Back to Login</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
