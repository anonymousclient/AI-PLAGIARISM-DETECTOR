{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5 fade-in">
    <div class="col-md-5 col-lg-4">
        <div class="glass-card p-4">
            <div class="text-center mb-4">
                <div class="icon-circle mb-3 mx-auto" style="color: var(--text-primary); border-color: rgba(255, 255, 255, 0.2);">
                    <i class="bi bi-envelope"></i>
                </div>
                <h3 class="mt-2 mb-1">Forgot Password</h3>
                <p class="text-muted small">Enter your registered email address to receive a 6-digit verification code.</p>
            </div>

            <form method="POST">
                <input type="hidden" name="role" value="{{ role }}">

                <div class="mb-4">
                    <label for="email" class="form-label-glass">Email Address</label>
                    <input type="email" class="form-control form-control-glass" id="email" name="email"
                           placeholder="Enter your email" required>
                </div>

                <button type="submit" class="btn btn-secondary w-100 mb-3" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);">
                    <i class="bi bi-send me-1"></i> Send OTP
                </button>

                <p class="text-center small mb-0">
                    <a href="{{ url_for('login', role=role) }}" style="color: var(--text-muted);"><i class="bi bi-arrow-left me-1"></i> Back to Login</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
