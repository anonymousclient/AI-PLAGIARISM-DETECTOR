{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4 fade-in">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card p-4">
            <h3 class="mb-4">
                <i class="bi bi-plus-circle" style="color: var(--accent-green)"></i> Create Assignment
            </h3>

            <form method="POST">
                <div class="mb-3">
                    <label for="subject" class="form-label-glass">Subject Name</label>
                    <input type="text" class="form-control form-control-glass" id="subject" name="subject"
                           placeholder="e.g., Mathematics" required>
                </div>

                <div class="mb-3">
                    <label for="class_id" class="form-label-glass">Select Class</label>
                    <select class="form-control form-control-glass" id="class_id" name="class_id" required>
                        <option value="" disabled selected>-- Select a Class --</option>
                        {% for class in classes %}
                        <option value="{{ class.class_id }}">{{ class.class_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label for="title" class="form-label-glass">Assignment Title</label>
                    <input type="text" class="form-control form-control-glass" id="title" name="title"
                           placeholder="e.g., Algebra Assignment" required>
                </div>

                <button type="submit" class="btn btn-gradient-green w-100">
                    <i class="bi bi-check-circle me-1"></i> Create Assignment
                </button>
            </form>

            <a href="{{ url_for('faculty_dashboard') }}" class="btn btn-glass w-100 mt-2">
                <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
