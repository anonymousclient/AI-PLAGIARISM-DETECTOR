{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5 fade-in">
    <div class="col-md-5 col-lg-4">
        <div class="glass-card p-4">
            <div class="text-center mb-4">
                <div class="icon-circle mb-3 mx-auto" style="color: #3b82f6; border-color: rgba(59, 130, 246, 0.2); background: rgba(59, 130, 246, 0.1);">
                    <i class="bi bi-shield-lock-fill"></i>
                </div>
                <h3 class="mt-2 mb-1">Reset Password</h3>
                <p class="small" style="color: #f1f5f9; opacity: 0.9;">Choose a strong password to secure your account.</p>
            </div>

            <form method="POST">
                
                <div class="mb-3">
                    <label for="new_password" class="form-label-glass" style="color: #f1f5f9;">New Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control form-control-glass" id="new_password" name="new_password"
                               placeholder="Enter new password" required minlength="6">
                        <button type="button" class="password-toggle" onclick="togglePassword('new_password', this)">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="confirm_password" class="form-label-glass" style="color: #f1f5f9;">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control form-control-glass" id="confirm_password" name="confirm_password"
                               placeholder="Confirm new password" required minlength="6">
                        <button type="button" class="password-toggle" onclick="togglePassword('confirm_password', this)">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-gradient-blue w-100">
                    <i class="bi bi-check-circle-fill me-1"></i> Update Password
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
