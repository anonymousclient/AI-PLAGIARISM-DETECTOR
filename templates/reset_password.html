{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5 fade-in">
    <div class="col-md-5 col-lg-4">
        <div class="glass-card p-4">
            <div class="text-center mb-4">
                <div class="icon-circle mb-3 mx-auto" style="color: var(--text-primary); border-color: rgba(255, 255, 255, 0.2);">
                    <i class="bi bi-key"></i>
                </div>
                <h3 class="mt-2 mb-1">Reset Password</h3>
                <p class="text-muted small">Enter your new password below.</p>
            </div>

            <form method="POST">
                
                <div class="mb-3">
                    <label for="new_password" class="form-label-glass">New Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control form-control-glass" id="new_password" name="new_password"
                               placeholder="Enter new password" required minlength="6">
                        <button type="button" class="password-toggle" onclick="togglePassword('new_password', this)">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="confirm_password" class="form-label-glass">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control form-control-glass" id="confirm_password" name="confirm_password"
                               placeholder="Confirm new password" required minlength="6">
                        <button type="button" class="password-toggle" onclick="togglePassword('confirm_password', this)">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-secondary w-100" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);">
                    <i class="bi bi-check-lg me-1"></i> Update Password
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
